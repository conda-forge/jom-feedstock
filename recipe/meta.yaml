{% set name = "jom" %}
{% set version = "1.1.5" %}
{% set sha256 = "89405212add992c35783fc5e938b2d7252d8447fde1dc64d335714325b54d668" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: http://download.qt.io/official_releases/jom/jom_{{ version.replace('.', '_') }}.zip
  sha256: {{ sha256 }}

build:
  number: 0
  skip: true  # [not win]
  script:
    - cp *.bat %LIBRARY_BIN%\
    - cp *.exe %LIBRARY_BIN%\
    - cp *.xml %LIBRARY_BIN%\

test:
  commands:
    - jom /VERSION

about:
  home: https://wiki.qt.io/Jom
  license: GPLv3
  license_family: GPL
  license_file: {{ RECIPE_DIR }}/LICENSE
  summary: 'jom is a clone of nmake to support the execution of multiple independent commands in parallel'

extra:
  recipe-maintainers:
    - isuruf
